<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>阿拉大叔 · 个人主页</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* 极简重置 */
    *, *::before, *::after { box-sizing: border-box; }
    body, h1, h2, p, ul { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      line-height: 1.6;
    }

    /* 布局 */
    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 14px;
      color: #666;
    }

    main section + section {
      margin-top: 28px;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    p, li {
      font-size: 14px;
      color: #333;
    }

    ul {
      list-style: none;
    }

    li + li {
      margin-top: 4px;
    }

    /* 链接 */
    a {
      color: #0f766e;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* 页脚 */
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="avatar">叔</div>
      <div>
        <h1>阿拉大叔</h1>
        <div class="tagline">写点代码，喝点咖啡，顺便记录生活。</div>
      </div>
    </header>

    <main>
      <section>
        <h2>关于我</h2>
        <p>
          常驻上海的程序员一枚，喜欢简单的设计、好用的工具和不折腾的生活方式。
        </p>
      </section>

      <section>
        <h2>最近在折腾</h2>
        <u
        <ul>
          >· 维护几个小玩具项目（脚本、工具、小网站）</l/li>
          >· 整理多年来的笔记，慢慢搬到线上</l/li>
          >· 偶尔写写博客，分享一点经验和踩过的坑</li>
        </ul>
      </section>

      <section>
        <h2>找到我</h2>
        <u
        <ul>
          >邮箱：<a href="mailto:ala@example.com">ala@example.com</a></l/li>
          >GitHub：<a href="https://github.com/aladashu" target="_blank">github.com/aladashu</a></l/li>
          >博客：<a href="https://aladashu.githu.io" target="_blank">aladashu.github.io</a></li>
        </ul>
      </section>
    </main>

    <footer>
      © <span id="year"></span> 阿拉大叔 · 保持简单
    </footer>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
